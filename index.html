, "B": "The original requestor's name", "C": "The certificate's serial number", "D": "The identifier for the open public ledger entry"}, "correct": "C", "explanation": "OCSP requests must include the certificate's serial number to allow the OCSP responder to check the CA database for the certificate and its status. It does not require the domain name or requestor's name. Open public ledgers are part of blockchains, not OCSP."}, {"n": 110, "q": "Rick checks the certificate for the site he is viewing and sees that it reads *.example.com. What type of certificate is this, and why is it in use?", "options": {"A": "It is a self-signed certificate, and it is used for testing purposes.", "B": "It is a wildcard certificate and is used for testing purposes.", "C": "It is a wildcard certificate and is used for multiple subdomains.", "D": "It is a self-signed certificate and is used for multiple subdomains."}, "correct": "C", "explanation": "Wildcard certificates have a * in them, denoting that they can be used for any subdomain. For example, in this question, the wildcard would match any *.example.com subdomain like test.example.com and sales.example.com. Self-signed certificates will not link to a root or intermediate CA, and thus cannot be verified with CAs."}, {"n": 111, "q": "John wants to write a procedure that addresses what to do if an employee inadvertently discloses their password due to a phishing attempt. What type of control is John considering?", "options": {"A": "A directive control", "B": "A proactive control", "C": "A deterrent control", "D": "A preventive control"}, "correct": "A", "explanation": "Policies and procedures are examples of directive controls. Deterrent controls attempt to dissuade attackers from taking action. Preventive controls attempt to stop security issues from occurring. Proactive controls are not a control category used on the Security+ exam."}, {"n": 112, "q": "Adam has been asked to implement an allow list for websites that his servers can visit. What concern should he raise about the implementation of allow lists?", "options": {"A": "Allow lists can be difficult to manage and cause failures if sites that are needed are not added.", "B": "Allow lists do not prevent sites from being visited if they are not on the allow list.", "C": "Allow lists cannot be configured to allow entire domains to be visited, creating significant overhead.", "D": "Allow lists are prone to error, allowing unwanted sites to be added."}, "correct": "A", "explanation": "Allow lists can be difficult to manage over time, particularly as manufacturers and vendors add additional download and update sites and subdomains. This creates additional work for administrators and can cause errors or issues with updates and patching if not carefully monitored. Allow lists do prevent sites from being visited if they are not on the list, they can be configured with wildcards to allow entire domains if desired, and they only allow sites that are added."}, {"n": 113, "q": "Jim wants to implement an authentication framework for his wireless network. Which of the following is most commonly used for wireless network authentication?", "options": {"A": "EAP", "B": "MS-CHAP", "C": "Kerberos", "D": "LDAP"}, "correct": "A", "explanation": "EAP is commonly used for authentication to wireless networks. MS-CHAP is used with PPTP-based VPNs, Kerberos is used for organizationwide authentication, and LDAP is used as part of authentication in Microsoft Active Directory domains, among other uses."}, {"n": 114, "q": "Gary is preparing change management documentation for an application restart after patching. What step should immediately follow the application restart?", "options": {"A": "Validation testing", "B": "Documenting the change occurred", "C": "Updating version control", "D": "Vulnerability scanning"}, "correct": "A", "explanation": "Validation testing should follow application restarts to ensure the application is working as expected after the restart. Documentation and updating version information can be done after the validation because if validation fails the change may need to be reversed. Vulnerability scanning should have been done prior to implementation in a test environment if needed."}, {"n": 115, "q": "Anna has been told that her organization has deployed microwave sensors in the organization's warehouses. What are microwave sensors most frequently used to detect?", "options": {"A": "Motion", "B": "Glass break", "C": "Heat signatures", "D": "Pressure"}, "correct": "A", "explanation": "Microwave sensors are commonly used to detect motion and have advantages over infrared sensors because they can work in a greater temperature range as well as traveling through some obstacles that would not allow infrared to penetrate them. They do not capture audio and are therefore not used for glass-break sensors, they do not capture thermal data like infrared sensors, and they are not pressure sensors."}, {"n": 116, "q": "When is data on a drive that uses full-disk encryption at the greatest risk?", "options": {"A": "During the system boot process", "B": "When the system is off", "C": "When the system is logged in and in use", "D": "When the system is being shut down"}, "correct": "C", "explanation": "In order for a drive to be used, it must be accessible to the operating system, meaning that when the system is logged in and in use data can be accessed. When full-disk encryption systems are booting and not logged in or when they are being shut down, they are typically not in a greater risk state, and they are most secure when shut down."}, {"n": 117, "q": "Alex has configured full-disk encryption for laptops that his organization issues to employees. What cybersecurity objective does this primarily support?", "options": {"A": "Confidentiality", "B": "Availability", "C": "Authenticity", "D": "Integrity"}, "correct": "A", "explanation": "Full-disk encryption primarily supports confidentiality by preventing unwanted access to the drive if it is stolen or otherwise exposed. The three objectives are confidentiality, integrity, and availability, which means authenticity is not a possible answer. Encryption does not increase availability, and integrity ensures that data has not been changed inadvertently or maliciously."}, {"n": 118, "q": "What process reviews control objectives for an organization, system, or service to determine if controls do not meet the control objectives?", "options": {"A": "A penetration test", "B": "A gap analysis", "C": "A Boolean analysis", "D": "A risk analysis"}, "correct": "B", "explanation": "A gap analysis is used to determine whether controls meet control objectives for a service, an organization, or a system. Penetration tests simulate an attacker trying to gain access or breach systems and other controls. Boolean analysis is not a security term, and risk analysis is done as part of risk assessment."}, {"n": 119, "q": "Frank configures an access control list to ensure that only specific IP addresses are able to connect to a service. What type of control has he deployed?", "options": {"A": "Managerial", "B": "Physical", "C": "Technical", "D": "Operational"}, "correct": "C", "explanation": "Access control lists are best described as technical controls. Managerial controls are procedural mechanisms; physical controls are controls that impact the physical world, like locks or fences; and operational controls are processes used to manage technology in a secure manner."}, {"n": 120, "q": "Annie has recently implemented a video surveillance system for her organization. What is the largest driver for new ongoing costs for an unmonitored video surveillance system?", "options": {"A": "Camera maintenance", "B": "The ongoing cost of storage", "C": "Security guards", "D": "Licensing"}, "correct": "B", "explanation": "Video surveillance system storage can drive additional costs based on decisions like how long video is retained, sensitivity levels, video resolution, and how heavily trafficked camera covered areas are. Licensing may grow if additional cameras are added, but there is no information indicating changes in the size of the implementation. Since this is an unmonitored system, no guards are involved, and camera maintenance is not a typical issue for a newly deployed system."}, {"n": 121, "q": "Henry's organization has recently experienced a ransomware attack and is restoring backups from a secure backup system. What type of security control is Henry using?", "options": {"A": "A preventive control", "B": "A directive control", "C": "A compensating control", "D": "A corrective control"}, "correct": "D", "explanation": "Restoring from backups helps to remediate a security issue, making this a corrective control. Preventive controls for Henry's situation might include endpoint detection and response (EDR) tools, directive controls would include policies and procedures for ransomware events, and compensating controls would be used if exceptions to the security policies needed to be made."}, {"n": 122, "q": "What data obfuscation technique relies on a lookup table that allows you to match the data you want to secure to a randomly generated value to ensure that the actual value is not easily accessible?", "options": {"A": "Hashing", "B": "Tokenization", "C": "Randomization", "D": "Masking"}, "correct": "B", "explanation": "Tokenization commonly uses randomly generated values that are assigned to replace existing known values. The token is stored in a lookup table, allowing the token to be checked against the table if needed. Hashing relies on a hash function, which is not mentioned here; randomization is not a data obfuscation technique; and masking replaces some or all of a sensitive field with a replacement character."}, {"n": 123, "q": "What challenge drives the need for key exchange mechanisms?", "options": {"A": "The number of keys required for symmetric encryption", "B": "The need to determine if a key is public", "C": "The need to exchange keys in a way that prevents others from obtaining a copy", "D": "The need to securely return keys to their owner after they are traded"}, "correct": "C", "explanation": "Key exchange algorithms focus on how to securely exchange keys so that others cannot obtain a copy of the key. Asymmetric encryption is used instead of symmetric encryption to resolve the issue of large numbers of symmetric keys; keys are either public or private in asymmetric systems and determining if they are public is not considered a problem; and keys are not returned to their owner, as only public keys should be exchanged."}, {"n": 124, "q": "Jackie is performing an impact analysis prior to a large-scale change her team is preparing to implement. Which of the following groups is not typically part of the impact analysis?", "options": {"A": "Stakeholders", "B": "System administrators", "C": "Service owners", "D": "Legal counsel"}, "correct": "D", "explanation": "Legal counsel is not typically part of change management processes. Stakeholders, service owners, and system administrators are commonly involved in impact analysis sessions."}, {"n": 125, "q": "Ilya wants to create a certificate signing request. Which of the following is not a typical part of a CSR?", "options": {"A": "The common name of the server", "B": "The organization's legal name", "C": "A contact email address", "D": "The organization's phone number"}, "correct": "D", "explanation": "Certificate requests include the common name (CN); organization (O); organization unit in the organization (OU); city or locality (L); the state, county, or region (S); country (C); and organizational contact email address."}, {"n": 126, "q": "Before Tony stores a password hash, he appends a string of characters that is unique to each password generated using an algorithm he created. What technique is Tony using to help protect his password hashes?", "options": {"A": "Tokenization", "B": "Steganography", "C": "Salting", "D": "Key stretching"}, "correct": "C", "explanation": "Tony is salting his password, which involves adding a string of characters to the password before it is hashed. This creates a unique hash, even if the password itself is an easily guessed or common password."}, {"n": 127, "q": "Which of the following is not a step taken when a transaction is entered in a blockchain?", "options": {"A": "The value of the block is determined.", "B": "The transaction is sent to a peer-to-peer network of computers.", "C": "The transaction is validated using equations.", "D": "A transaction history is maintained as part of the blockchain."}, "correct": "A", "explanation": "While cryptocurrency is a common use of blockchain technology, it isn't the only use. Values of blocks are not determined as part of transactions\u2014in fact, even in cryptocurrency uses, values are determined by prices set on exchanges as sellers and buyers exchange cryptocurrencies."}, {"n": 128, "q": "Kent wants to encrypt network traffic in transit. What cryptographic protocol is most frequently used to add encryption to existing protocols?", "options": {"A": "S/MIME", "B": "TLS", "C": "MPLS", "D": "SSH"}, "correct": "B", "explanation": "TLS, or Transport Layer Security, is a cryptographic protocol used to secure network traffic in transit. S/MIME is used for digital signatures and encryption for email. MPLS is multiprotocol label switching, a network routing technique. SSH is Secure Shell and is used for encrypted command-line access as well as to tunnel other protocols in some cases."}, {"n": 129, "q": "Which of the following is not a common concern in change management processes related to legacy applications?", "options": {"A": "Lack of vendor support", "B": "Lack of patches and updates", "C": "Ongoing licensing costs", "D": "Availability of third-party or consultant expertise"}, "correct": "C", "explanation": "Legacy applications are often unsupported, don't receive new patches or updates, and have a shrinking or nonexistent base of consultants and experts. Licensing for legacy applications is often not available; this makes ongoing licensing costs a less frequent concern."}, {"n": 130, "q": "Elaine wants to document the technical concerns that dependencies create as part of her change management process. Which of the following concerns is the most common when dependencies are encountered as part of change management?", "options": {"A": "Documenting the dependencies to ensure they are addressed", "B": "Removing the dependencies as part of the change", "C": "Patching the dependencies in addition to the main application", "D": "Updating diagrams related to the dependencies"}, "correct": "A", "explanation": "Change management processes typically focus on documenting dependencies and ensuring they are met. That may involve ensuring that the appropriate version is installed or that applications are restarted in a specific order, or that a service is available that is needed for a system to successfully function. Removing dependencies is unlikely, patching may or may not be required, and updating diagrams is less important than ensuring the dependencies are understood and met."}, {"n": 131, "q": "Gary has implemented record-level encryption for his database. How many keys will he use in a typical implementation of record-level encryption?", "options": {"A": "One key per record", "B": "One key per column", "C": "One key per table", "D": "One key per database"}, "correct": "A", "explanation": "Record-level encryption relies on a unique key for each record, keeping records private to a user or account in typical usage."}, {"n": 132, "q": "Justin's laptop is part of his organization's zero-trust architecture. What term is used to refer to a device like a laptop, desktop, or mobile device in a zero-trust design?", "options": {"A": "A subject", "B": "A policy engine", "C": "A service provider", "D": "A policy application point"}, "correct": "A", "explanation": "Justin's laptop is a subject. Subjects like users, applications, or devices are not trusted by default. Justin's system is also likely a policy enforcement point, not a policy application point. Policy engines evaluate policies and use threat information and other data to determine if access should be given. Service providers are concepts used in federation, rather than in zero-trust environments."}, {"n": 133, "q": "Susan's organization has deployed a zero-trust architecture. Which of the following zero-trust control plane components uses rules to determine who can access a service based on the security status of their system, threat data, and similar information?", "options": {"A": "Adaptive authorization", "B": "Threat scope reduction", "C": "Policy-driven access control", "D": "Secured zones"}, "correct": "C", "explanation": "Policy-driven access control focuses on using rules to determine who can access a service based on security state and other information. Adaptive authorization adjusts authorization levels based on factors like device status, user behavior, and location. Threat scope reduction is a key concept in zero trust that focuses on ensuring that threats have less of a target to attack if they enter the secure environment. Secured zones are no longer a critical concept for zero trust, as continuous verification means all interactions are secured and validated."}, {"n": 134, "q": "Scott wants to implement OCSP as part of an application he is creating. What will he implement?", "options": {"A": "A corrective control security process", "B": "Certificate status checking", "C": "Transport encryption", "D": "Full-disk encryption"}, "correct": "B", "explanation": "OCSP, or the Online Certificate Status Protocol, provides a way to check on the status of a certificate, including whether it has been revoked."}, {"n": 135, "q": "Which of the following is not a common reason to implement key escrow?", "options": {"A": "Regulatory compliance", "B": "Providing access to encrypted data for administrative reasons", "C": "Providing access to encrypted data in emergencies", "D": "Preventing the need for key rotation after a user leaves"}, "correct": "D", "explanation": "Key rotation should occur when a user leaves, even if the key is escrowed. Regulatory compliance as well as providing access for administrative or emergency access to organizational data are common reasons to implement key escrow."}, {"n": 136, "q": "Yariv discovers that he has exposed his private key to other users in his organization by sending it via email instead of his public key. What should he do?", "options": {"A": "Ask the other users to delete any copies of his private key that they may have.", "B": "Immediately add his key to a CRL and reissue the key.", "C": "Create a new keypair and notify others that he has replaced his keypair.", "D": "Continue to operate as normal as long as the private key was not used maliciously."}, "correct": "C", "explanation": "Once a private key has been exposed, it should not be considered secure, even in an organization of trusted users. Since Yariv exposed his private key via email, he cannot ensure that it is not available in another user's email archives, and he must immediately create a new keypair and advise individuals that he works with of his new public key."}, {"n": 137, "q": "What happens if a mistake is made and an incorrect transaction is entered into the open public ledger in a blockchain?", "options": {"A": "The transaction is reversed once it is discovered, and the original transaction is removed from the record.", "B": "A new transaction must be processed, and both transactions remain in the record.", "C": "The original transaction is updated and becomes the new record.", "D": "An error block must be mined and labeled with the transaction number and error details."}, "correct": "B", "explanation": "Since blockchains are not changed after transactions are recorded, a new transaction must be recorded and both transactions remain in the record as part of the ledger."}, {"n": 138, "q": "Which of the following activities will not typically result in a need to update policies and procedures?", "options": {"A": "Deploying a new application", "B": "Installing patches for an existing application", "C": "Conducting a lessons learned exercise after an incident", "D": "Changes in regulations"}, "correct": "B", "explanation": "Patches and updates are less likely to result in a need to update policies and procedures. New applications, lessons learned exercises, and regulatory changes are all likely to result in changes to policies and procedures."}, {"n": 139, "q": "Hrant's organization wants to ensure that staff members use both something they know and something they have as part of their physical access control scheme. Which of the following solutions meets that requirement?", "options": {"A": "Security guards and access badges", "B": "Keys and access control vestibules", "C": "Access badges and PINs", "D": "Security guards and access control vestibules"}, "correct": "C", "explanation": "Access badges are an example of something you have, and PINs are an example of something you know. Combining the two is a common requirement to help prevent a lost badge from providing access to a secure facility."}, {"n": 140, "q": "Julia wants to detect if an intruder enters a space using a sensor system. Which of the following is not typically used to detect intruders?", "options": {"A": "Infrared sensors", "B": "Pressure sensors", "C": "Microwave sensors", "D": "Ultrasonic sensors"}, "correct": "C", "explanation": "Microwave sensors are not commonly used to detect intruders. Infrared and ultrasonic sensors are commonly used, and pressure sensors may be used in special circumstances."}, {"n": 141, "q": "Which of the following is not true for a secure cryptographic hash system?", "options": {"A": "Hashes are a one-way function.", "B": "Hashes generate a fixed length output.", "C": "Hashes may generate the same output for multiple inputs.", "D": "Hashes are commonly used to verify the integrity of files."}, "correct": "C", "explanation": "Secure cryptographic hash systems should not generate the same output for two different inputs. They should, however, be one-way functions and generate fixed length output, and they are commonly used to verify the integrity of files."}, {"n": 142, "q": "Casey wants to prevent tailgating attacks on her datacenter. What type of physical security solution should she put in place?", "options": {"A": "Video surveillance", "B": "Bollards", "C": "An access control vestibule", "D": "Access badges"}, "correct": "C", "explanation": "Access control vestibules are designed to stop tailgating attacks, which occur when someone follows an authorized user into a space. Access badges do not prevent this, as tailgating relies on passing through a door someone with access has opened. Video surveillance may allow you to see the attack but won't stop it, and bollards are used to prevent vehicles from passing through a space."}, {"n": 143, "q": "As Casey continues to work to secure her datacenter, she decides to deploy access badges. What technique will provide the greatest assurance that a stolen or cloned access badge will not allow an attacker access?", "options": {"A": "Use barcode-based badges.", "B": "Require a PIN along with the badge.", "C": "Use RFID-based badges.", "D": "Include a picture of the user on the badge."}, "correct": "B", "explanation": "Requiring a PIN is the best option unless guards are in place to validate that the person using the badge matches the badge. Even then a PIN may be better than a picture if the badge does not have other elements that will prevent it from being modified. Barcode and RFID badges can still be cloned and are not as effective as requiring a knowledge-based identifier as well as a possession-based identifier."}, {"n": 144, "q": "What term describes the function of digital signatures related to proving that the signature was provided by the owner of a given private key?", "options": {"A": "Ledger-based validation", "B": "Nonrepudiation", "C": "Key stretching", "D": "Authentication"}, "correct": "B", "explanation": "A feature of digital signatures is nonrepudiation. A signed file or message can be proven to be from the signer, proving that it is legitimate. Key stretching describes techniques used to make it harder to crack weak keys. Authentication is the process of validating that a person is who they say they are but is not specific to digital signatures. Ledger-based validation was made up for this question."}, {"n": 145, "q": "John wants to send his public key to another user. What steps are necessary to do so?", "options": {"A": "The key must be sent using Diffie\u2013Hellman.", "B": "The key can simply be sent via email or other means.", "C": "The key must be sent using RSA.", "D": "The key must be signed, then sent via email or other means."}, "correct": "B", "explanation": "Public keys can simply be sent to another user if so desired. It is common to provide public keys via key servers or even in email signatures, although additional verification that the key belongs to an individual may be desirable, if not required."}, {"n": 146, "q": "Tracy wants to use the most secure salting solution she can. Which of the following options will provide the most secure salt?", "options": {"A": "Set a salt value and store it in a database.", "B": "Set a salt value and store it in the program code.", "C": "Generate a unique salt for each hashed entry.", "D": "Generate a unique salt value every time a value is used."}, "correct": "C", "explanation": "Generating a unique salt for each hashed entry is the most secure option among those listed. Storing a fixed salt in a database or in code reduces the complexity of the salted information, making it possible for an attacker to acquire the single salt and then attack the stored hashes. Generating a unique salt every time a value is used is impractical due to the rate of change."}, {"n": 147, "q": "Bob conducts a periodic risk assessment of his organization. What category of security control is this?", "options": {"A": "Technical", "B": "Managerial", "C": "Operational", "D": "Physical"}, "correct": "B", "explanation": "Risk assessments are an example of a managerial control, which includes procedural mechanisms related to the risk management process. Technical controls enforce confidentiality, integrity, and availability using technical means. Physical controls like locks and fences impact the physical world. Operational controls include processes put in place to manage technology in a secure manner."}, {"n": 148, "q": "After a breach, Jackie removes malicious software from a server that she is responsible for. What control type should she classify this as?", "options": {"A": "Preventive", "B": "Corrective", "C": "Compensating", "D": "Deterrent"}, "correct": "B", "explanation": "Removing malicious software is an example of a corrective control, which seeks to remediate security issues that have already occurred. Preventive controls are intended to stop security issues from occurring. Compensating controls are designed to mitigate risks associated with exemptions to the security policy. Deterrent controls attempt to prevent a malicious actor from violating security policies."}, {"n": 149, "q": "What can a root SSL (TLS) certificate do?", "options": {"A": "Remove a certificate from a CRL", "B": "Generate a signing key and use it to sign a new certificate", "C": "Authorize new CA users", "D": "Allow key stretching"}, "correct": "B", "explanation": "Root certificates are at the root of trust in a CA hierarchy and allow signing keys to be created and used to sign certificates. They are not used to authorize new CA users or to remove certificates from a CRL. Key stretching is used to make weak keys stronger, not as part of cryptographic certificates."}, {"n": 150, "q": "Christina wants to authenticate individuals as part of her AAA implementation. What will she need to do to authenticate users?", "options": {"A": "Match users to roles and ensure that rights are assigned.", "B": "Conduct biometric enrollments for every user.", "C": "Use identity proofing for each user she creates.", "D": "Ensure that users provide an identity and one or more authentication factors."}, "correct": "D", "explanation": "Authentication requires that users provide (claim) an identity and then provide one or more authentication factors like a password, biometric factor, or multifactor code. Authorization relies on matching users and roles to allow users to perform tasks once they are authenticated. Biometric enrollments and identity proofing may be desirable but are not necessarily required for any given authentication system."}];

function shuffle(arr, seed) {
  var a = arr.slice();
  var s = seed;
  for (var i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    var j = Math.floor((s / 233280) * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

var total = QUESTIONS.length;
var order = shuffle(Array.from({length: total}, function(_, i){ return i; }), 42);
var idx = 0;
var answers = {}; // n -> {selected, correct}

var qtextEl = document.getElementById('qtext');
var optionsEl = document.getElementById('options');
var explainEl = document.getElementById('explainBox');
var qcounterEl = document.getElementById('qcounter');
var scorecounterEl = document.getElementById('scorecounter');
var progressFillEl = document.getElementById('progressFill');
var btnPrev = document.getElementById('btnPrev');
var btnNext = document.getElementById('btnNext');
var quizView = document.getElementById('quiz-view');
var summaryView = document.getElementById('summary-view');

function currentQ() {
  return QUESTIONS[order[idx]];
}

function render() {
  var q = currentQ();
  var answeredCount = Object.keys(answers).length;
  var correctCount = 0;
  for (var k in answers) { if (answers[k].correct) correctCount++; }

  qcounterEl.textContent = 'Question ' + (idx + 1) + ' of ' + total;
  scorecounterEl.textContent = answeredCount > 0 ? (correctCount + ' / ' + answeredCount + ' correct') : 'Domain 1.0 · General Security Concepts';
  progressFillEl.style.width = (((idx + 1) / total) * 100) + '%';

  qtextEl.textContent = q.q;

  var existing = answers[q.n];
  var letters = Object.keys(q.options);

  optionsEl.innerHTML = '';
  letters.forEach(function(letter) {
    var btn = document.createElement('button');
    btn.className = 'option';
    btn.setAttribute('data-letter', letter);

    var badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = letter;

    var textSpan = document.createElement('span');
    textSpan.textContent = q.options[letter];

    btn.appendChild(badge);
    btn.appendChild(textSpan);

    if (existing) {
      btn.classList.add('locked');
      if (letter === q.correct) {
        btn.classList.add('correct-pick');
        badge.classList.add('correct-badge');
        badge.textContent = '✓';
      } else if (letter === existing.selected) {
        btn.classList.add('wrong-pick');
        badge.classList.add('wrong-badge');
        badge.textContent = '✗';
      } else {
        btn.classList.add('dimmed');
      }
    } else {
      btn.addEventListener('click', function() { selectAnswer(letter); });
    }

    optionsEl.appendChild(btn);
  });

  if (existing) {
    var wasCorrect = existing.correct;
    explainEl.innerHTML = '';
    var box = document.createElement('div');
    box.className = 'explain' + (wasCorrect ? ' is-correct' : '');
    var label = document.createElement('div');
    label.className = 'explain-label';
    label.textContent = (wasCorrect ? 'Correct' : 'Explanation') + ' — Answer: ' + q.correct;
    var p = document.createElement('p');
    p.textContent = q.explanation;
    box.appendChild(label);
    box.appendChild(p);
    explainEl.appendChild(box);
  } else {
    explainEl.innerHTML = '';
  }

  btnPrev.disabled = (idx === 0);
  btnNext.classList.toggle('active', !!existing);
  btnNext.textContent = (idx + 1 >= total) ? 'See Results →' : 'Next Question →';
}

function selectAnswer(letter) {
  var q = currentQ();
  if (answers[q.n]) return;
  answers[q.n] = { selected: letter, correct: (letter === q.correct) };
  render();
}

btnNext.addEventListener('click', function() {
  var q = currentQ();
  if (!answers[q.n]) return;
  if (idx + 1 >= total) {
    showSummary();
  } else {
    idx++;
    render();
  }
});

btnPrev.addEventListener('click', function() {
  if (idx === 0) return;
  idx--;
  render();
});

function showSummary() {
  quizView.classList.add('hidden');
  summaryView.classList.remove('hidden');

  var correctCount = 0;
  for (var k in answers) { if (answers[k].correct) correctCount++; }
  var pct = Math.round((correctCount / total) * 100);

  var verdict = 'Keep at it';
  var color = 'var(--wrong)';
  if (pct >= 90) { verdict = 'Exam ready'; color = 'var(--accent)'; }
  else if (pct >= 75) { verdict = 'Strong grasp'; color = 'var(--accent)'; }
  else if (pct >= 60) { verdict = 'Getting there'; color = 'var(--gold)'; }

  var scoreEl = document.getElementById('summaryScore');
  scoreEl.textContent = pct + '%';
  scoreEl.style.color = color;
  var verdictEl = document.getElementById('summaryVerdict');
  verdictEl.textContent = verdict;
  verdictEl.style.color = color;
  document.getElementById('summarySub').textContent = correctCount + ' of ' + total + ' answered correctly';

  var reviewSection = document.getElementById('reviewSection');
  reviewSection.innerHTML = '';

  var missed = order.map(function(i){ return QUESTIONS[i]; }).filter(function(qq){
    return answers[qq.n] && !answers[qq.n].correct;
  });

  if (missed.length > 0) {
    var head = document.createElement('div');
    head.className = 'review-head';
    head.textContent = 'Questions to review (' + missed.length + ')';
    reviewSection.appendChild(head);

    missed.forEach(function(qq) {
      var item = document.createElement('div');
      item.className = 'review-item';
      var qShort = qq.q.length > 90 ? qq.q.slice(0, 90) + '…' : qq.q;
      var num = document.createElement('span');
      num.style.fontFamily = 'var(--mono)';
      num.style.color = 'var(--wrong)';
      num.style.marginRight = '8px';
      num.textContent = '#' + qq.n;
      item.appendChild(num);
      item.appendChild(document.createTextNode(qShort));
      var meta = document.createElement('span');
      meta.className = 'review-meta';
      meta.textContent = 'Your answer: ' + answers[qq.n].selected + ' · Correct: ' + qq.correct;
      item.appendChild(meta);
      reviewSection.appendChild(item);
    });
  }
}

document.getElementById('btnRestart').addEventListener('click', function() {
  idx = 0;
  answers = {};
  summaryView.classList.add('hidden');
  quizView.classList.remove('hidden');
  render();
});

render();
</script>
</body>
</html>
