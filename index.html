<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security+ Domain 1.0 — Practice Quiz</title>
<style>
  :root{
    --ink:#1a2332;
    --paper:#f6f3ec;
    --paper-raised:#fdfcf8;
    --line:#d8d2c4;
    --accent:#1f6f54;
    --accent-soft:#e3efe9;
    --wrong:#9b3b3b;
    --wrong-soft:#f5e6e6;
    --gold:#b8862f;
    --muted:#6b6458;
    --mono: 'SF Mono', Consolas, 'Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:Georgia, 'Times New Roman', serif;
  }
  .wrap{max-width:680px;margin:0 auto;padding:40px 24px 100px;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:10px;}
  .progress-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;}
  .progress-track{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:28px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .4s ease;}
  .qtext{font-size:19px;line-height:1.55;margin-bottom:24px;}
  .option{
    width:100%;text-align:left;display:flex;align-items:flex-start;gap:14px;
    padding:14px 16px;margin-bottom:10px;background:var(--paper-raised);
    border:1.5px solid var(--line);border-radius:8px;cursor:pointer;
    font-family:Georgia,serif;font-size:16px;line-height:1.45;color:var(--ink);
    transition:all .15s ease;
  }
  .option:hover:not(.locked){border-color:var(--gold);background:#fffaf0;}
  .option.locked{cursor:default;}
  .option.correct-pick{background:var(--accent-soft);border-color:var(--accent);}
  .option.wrong-pick{background:var(--wrong-soft);border-color:var(--wrong);}
  .option.dimmed{color:var(--muted);}
  .badge{
    flex-shrink:0;width:24px;height:24px;border-radius:50%;
    border:1.5px solid var(--muted);display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:12px;font-weight:600;margin-top:1px;
  }
  .badge.correct-badge{background:var(--accent);border-color:var(--accent);color:#fff;}
  .badge.wrong-badge{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .explain{
    margin-top:18px;padding:18px 20px;border-radius:8px;
    border:1.5px solid var(--gold);background:#fff;
    animation:fadeIn .35s ease;
  }
  .explain.is-correct{background:var(--accent-soft);border-color:var(--accent);}
  .explain-label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:700;}
  .explain.is-correct .explain-label{color:var(--accent);}
  .explain p{margin:0;font-size:15px;line-height:1.6;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  .nav-row{display:flex;gap:12px;margin-top:28px;}
  .btn{
    font-family:var(--mono);font-size:13px;letter-spacing:.05em;text-transform:uppercase;
    border-radius:8px;border:none;cursor:pointer;padding:13px 20px;font-weight:600;
  }
  .btn-prev{flex:0 0 auto;background:transparent;color:var(--muted);border:1.5px solid var(--line);}
  .btn-prev:disabled{color:var(--line);cursor:default;}
  .btn-next{flex:1;background:var(--line);color:var(--muted);cursor:default;}
  .btn-next.active{background:var(--ink);color:var(--paper);cursor:pointer;}
  .btn-restart{display:block;width:100%;padding:16px;background:var(--ink);color:var(--paper);border:none;border-radius:8px;font-size:15px;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-weight:600;}
  .summary-score{font-size:64px;font-family:Georgia,serif;font-weight:700;line-height:1;text-align:center;}
  .summary-verdict{font-size:18px;font-weight:600;margin-top:6px;text-align:center;}
  .summary-sub{font-size:14px;color:var(--muted);margin-top:8px;text-align:center;}
  .review-head{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:8px;}
  .review-item{padding:12px 0;border-bottom:1px solid var(--line);font-size:14px;line-height:1.5;}
  .review-meta{display:block;font-size:12px;color:var(--muted);margin-top:4px;}
  .hidden{display:none;}
</style>
</head>

  <div id="quiz-view">
    <div class="eyebrow">Security+ SY0-701 · Domain 1.0</div>

      <span id="qcounter">Question 1 of 150</span>
      <span id="scorecounter">Domain 1.0 · General Security Concepts</span>

    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

    <div class="nav-row">

      <button class="btn btn-next" id="btnNext">Next Question →</button>
    </div>

  <div id="summary-view" class="hidden">
    <div class="eyebrow" style="text-align:center;display:block;">Domain 1.0 · Results</div>
    <div class="summary-score" id="summaryScore">0%</div>
    <div class="summary-verdict" id="summaryVerdict"></div>
    <div class="summary-sub" id="summarySub"></div>
    <div id="reviewSection" style="margin-top:36px;"></div>
    <button class="btn-restart" id="btnRestart" style="margin-top:20px;">Restart Quiz</button>

<script>
var QUESTIONS = [{"n": 1, "q": "Felicia wants to deploy an encryption solution that will protect files in motion as they are copied between file shares as well as at rest, and also needs it to support granular, per-user security. What type of solution should she select?", "options": {"A": "Partition encryption", "B": "File encryption", "C": "Full-disk encryption", "D": "Record-level encryption"}, "correct": "B", "explanation": "File encryption meets all of the needs described. Full-disk encryption is easier to deploy and manage but does not protect individual files in motion and does not effectively support multiuser scenarios. Partition-level encryption has the same challenges, albeit at a partition rather than full-disk level. Record-level encryption is typically used in databases to protect individual records or entries."}, {"n": 2, "q": "Valerie wants to use a certificate to handle multiple subdomains for her website, including the sales.example.com and support.example.com subdomains. What type of certificate should she use?", "options": {"A": "A self-signed certificate", "B": "A root of trust certificate", "C": "A CRL certificate", "D": "A wildcard certificate"}, "correct": "D", "explanation": "Wildcard certificates are used to handle multiple subdomains with a single certificate. A self-signed certificate will not be recognized by browsers and other services, creating confusion for customers. Root of trust certificates and CRL certificates are not types of certificates."}, {"n": 3, "q": "What information is analyzed during a gap analysis?", "options": {"A": "Control objectives and controls intended to meet the objectives", "B": "Physically separate networks and their potential connection points", "C": "Compensating controls and the controls they are replacing", "D": "Security procedures and the policies they are designed to support"}, "correct": "A", "explanation": "Gap analysis considers control objectives and the controls that are intended to meet the objectives."}, {"n": 4, "q": "Susan's team has recommended an application restart for a production, customer-facing application as part of an urgent patch due to a security update. What technical implication is the most common concern when conducting an application restart?", "options": {"A": "Application configuration changes caused by the restart", "B": "Whether the patch will properly apply", "C": "Lack of security controls during the restart", "D": "The downtime during the restart"}, "correct": "D", "explanation": "In most production environments downtime is the primary concern when considering an application restart. Many application architectures are designed to allow restarts of individual systems or services without creating an outage or downtime. Configuration changes should not be created by a restart, patches generally apply properly, and security controls should be in place throughout the process."}, {"n": 5, "q": "Using a tool like git is most frequently associated with what critical change management process?", "options": {"A": "Having a backout plan", "B": "Stakeholder analysis", "C": "Version control", "D": "Standard operating procedures (SOPs)"}, "correct": "C", "explanation": "Organizations frequently use tools like git to build repositories that support their need for version control. Backout plans might note that you need to return to the prior version but will need to include how to do so. Stakeholder analysis and SOPs are not specifically supported by or improved by using git."}, {"n": 6, "q": "Jacob is concerned that the password used for one of his organization's services is weak, and he wants to make it harder to crack by making it harder to test possible keys during a brute-force attack. What is this technique called?", "options": {"A": "Master keying", "B": "Key stretching", "C": "Key rotation", "D": "Passphrase armoring"}, "correct": "B", "explanation": "Key stretching makes potentially weak keys more resistant to brute-forcing and often involves using a hash or block cipher repeatedly to make the original value harder to crack. Key rotation is the process of changing keys on a periodic basis to limit the impact of potential exposure. Master keying and passphrase armoring are not commonly used concepts for information security, although master keys are used for physical locks."}, {"n": 7, "q": "Log monitoring is an example of what control category?", "options": {"A": "Technical", "B": "Managerial", "C": "Operational", "D": "Physical"}, "correct": "C", "explanation": "Operational controls like log monitoring, change management processes, and vulnerability management are all put in place to support managing and using technology in a secure manner."}, {"n": 8, "q": "Rick wants to make offline brute-force attacks against his password file very difficult for attackers. Which of the following is not a common technique to make passwords harder to crack?", "options": {"A": "Use of a salt", "B": "Use of a pepper", "C": "Use of a purpose-built password hashing algorithm", "D": "Encrypting password plain text using symmetric encryption"}, "correct": "D", "explanation": "Retaining the actual password is not a best practice, and thus encrypting password plain text is not a common technique to make passwords harder to crack. Since the application would need the cryptographic key to read the passwords, anybody who had access to that key could decrypt the passwords. Using a salt, a pepper, and a cryptographic hashing algorithm designed for passwords are all common best practices to prevent offline brute-force attacks."}, {"n": 9, "q": "Diffie\u2013Hellman and RSA are both examples of what important encryption-related solution?", "options": {"A": "Rekeying", "B": "Certificate revocation protocols", "C": "Key exchange algorithms", "D": "Key generation algorithms"}, "correct": "C", "explanation": "Both Diffie\u2013Hellman and RSA are key exchange algorithms designed to securely allow key exchange between users or systems that have not previously communicated."}, {"n": 10, "q": "Sally wants to ensure that her change management process includes a procedure for what to do if the change fails. What should she create to handle this possibility?", "options": {"A": "An impact analysis", "B": "A backout plan", "C": "A regression test", "D": "A maintenance window"}, "correct": "B", "explanation": "Backout plans document what to do to return to a state prior to the change being made and are designed to be implemented if the change fails. They may involve undoing changes, restoring from backups, or taking other steps and they must contain an appropriate level of detail to ensure that the change can be undone. An impact analysis looks at the potential impact of a change, regression testing ensures that old issues are not introduced in new updates, and maintenance windows are scheduled to allow for downtime or other maintenance activities with appropriate communications, staffing, and other needed elements."}, {"n": 11, "q": "Theresa is concerned that her scheduled maintenance window may extend beyond the allocated time due to an unexpected issue. What element from the CIA triad is she concerned about?", "options": {"A": "Criticality", "B": "Accessibility", "C": "Integrity", "D": "Availability"}, "correct": "D", "explanation": "The CIA triad is confidentiality, availability, and integrity. Theresa's extended outage window will impact the availability of her applications and services."}, {"n": 12, "q": "Alaina is concerned about vehicles that might impact her organization's backup generator. What should she install to prevent both inadvertent and purposeful vehicle impacts on a generator installed outside her building near a parking lot?", "options": {"A": "A speed bump", "B": "An access control vestibule", "C": "Bollards", "D": "A chain-link fence"}, "correct": "C", "explanation": "Bollards are used to protect infrastructure and structures, and they are usually concrete or steel posts, planters, or similar structures that are intended to prevent a vehicle from impacting what they protect. Speed bumps won't prevent an impact, although they might slow it. Access control vestibules are used to ensure only authorized personnel access a space, and chain-link fences are not typically sufficient for this type of control."}, {"n": 13, "q": "Ben has deployed a data loss prevention (DLP) tool that inspects data and flags specific data types for review before emails containing it are sent outside the organization. What control type best describes this type of solution?", "options": {"A": "Managerial", "B": "Detective", "C": "Corrective", "D": "Preventive"}, "correct": "D", "explanation": "This is a preventive control that is intended to prevent sensitive data from being sent outside the organization. Managerial controls are procedural mechanisms, corrective controls remediate security issues that have already occurred, and detective controls identify security events that have already occurred."}, {"n": 14, "q": "What type of control is a policy or procedure?", "options": {"A": "Directive", "B": "Corrective", "C": "Detective", "D": "Preventive"}, "correct": "A", "explanation": "Policies and procedures are examples of directive control that inform employees and others of what they should do to achieve security objectives. Corrective controls remediate already existing security issues, detective controls identify security events that have already happened, and preventive controls attempt to stop a security issue before it occurs."}, {"n": 15, "q": "Murali has deployed a file integrity monitoring tool and has configured alerts to notify him if files are modified. What control type best describes this solution?", "options": {"A": "Preventive", "B": "Deterrent", "C": "Directive", "D": "Detective"}, "correct": "D", "explanation": "This solution monitors for changes and is therefore a detective control. It does not prevent changes, and intruders and malicious actors are unlikely to know about it, making it a poor deterrent. Since it is not a policy or practice, it is not a directive control."}, {"n": 16, "q": "Charles wants to reduce the threat scope of compromised credentials. What type of the following security controls is best suited to meeting this need?", "options": {"A": "Single sign-on", "B": "Federation", "C": "Zero trust", "D": "Multifactor authentication (MFA)"}, "correct": "C", "explanation": "Zero trust designs implement continuous verification, which is an effective control used to limit the threat scope of compromised credentials. While multifactor authentication can be a useful control in this circumstance, a fully implemented zero-trust design will provide greater control than just MFA alone. Single sign-on and federation are both likely to increase threat scope in a compromised credential scenario."}, {"n": 17, "q": "Carol wants to obfuscate data that is contained in her database. She wants to be able to refer to the data elements without having the actual data exposed. What type of obfuscation option should she select?", "options": {"A": "Tokenization", "B": "Encryption", "C": "Data masking", "D": "Data randomization"}, "correct": "A", "explanation": "Tokens replace data with a value that is linked specifically to the data, allowing it to be referenced and used without the field being exposed. Encryption is not used for this purpose, data masking hides elements of a data field like digits from a credit card number, and data randomization is not an obfuscation method."}, {"n": 18, "q": "What key is used to decrypt information sent by another individual between two people using public key encryption?", "options": {"A": "The recipient's private key", "B": "The recipient's public key", "C": "The sender's private key", "D": "The sender's public key"}, "correct": "A", "explanation": "The sender uses the receiver's public key to encrypt the message, then the receiver uses their private key to decrypt the message. This ensures that the receiver is the only person who can decrypt a message sent using public key encryption."}, {"n": 19, "q": "Selah's organization has recently experienced a breach and the private keys for her organization's certificates were exposed. What should she immediately do?", "options": {"A": "Reissue the certificates with changed hostnames and other details.", "B": "Replace the certificates with self-signed certificates until they can be replaced by the vendor.", "C": "Revoke the certificates and place them on a certificate revocation list.", "D": "Replace the certificates with wildcard certificates."}, "correct": "C", "explanation": "If a certificate may have been breached, organizations should immediately revoke the certificates and place them on a certificate revocation list (CRL). They will then need to replace the certificates with new certificates, but changing hostnames is not required as the certificates themselves will be new. The other options are not typical practices."}, {"n": 20, "q": "Which of the following is not a major concern related to downtime caused by patching and system updates?", "options": {"A": "Attackers compromising the system or service while it is offline", "B": "Security systems or functions being offline during restart or shutdown processes", "C": "Unexpected extended downtime", "D": "Dependencies between systems or services related to downtime"}, "correct": "A", "explanation": "Attackers are unlikely to be able to compromise a system or service while it is offline. They may, however, be able to take advantage of the restart or shutdown process if critical security processes are not online for some portion of the process. Unexpected downtime and dependencies between systems must also be considered when planning patching and system updates."}, {"n": 21, "q": "Joanna wants to ensure that the most current version of each component in her application is deployed. What change management process will help the most with this requirement?", "options": {"A": "Dependency mapping", "B": "Version control", "C": "Impact analysis", "D": "Allow and deny lists"}, "correct": "B", "explanation": "Version control is important to ensure that the current and correct version of an application or component is deployed. Dependency mapping can be important to ensure that changed versions don't cause other issues, but it isn't specifically needed to ensure that the current version is what you're deploying. Impact analysis and allow/deny lists are not directly relevant to this requirement."}, {"n": 22, "q": "Greg wants to implement a version control system to ensure that changes are made in ways that will not cause problems for his organization's critical software. Which of the following is not a common feature of version control systems designed for software source code?", "options": {"A": "Atomic operations", "B": "File locking", "C": "Regression testing", "D": "Tagging and labeling"}, "correct": "C", "explanation": "Version control systems track versions but don't do testing themselves. Atomic operations ensure that actions like commits don't overwrite other commits in progress. File locking allows a developer to check out a file while it is being worked on, and tagging and labeling helps developers track files and versions."}, {"n": 23, "q": "Christina wants to implement a physical security control that has the greatest flexibility in how it is applied because she knows that exceptions to security practices may be required at times. Which of the following solutions has the greatest flexibility?", "options": {"A": "Video surveillance", "B": "Security guards", "C": "Access badges", "D": "Access control vestibules"}, "correct": "B", "explanation": "Security guards are expensive but offer the most flexibility when organizations need intelligence and reasoning to be applied to security events and unexpected needs. Christina knows that guards can often identify issues that a fixed sensor or control cannot."}, {"n": 24, "q": "Lisa wants to ensure that theft of a device will not lead to exposure of the data contained on the device if the device is locked or turned off. What type of encryption should she select to best ensure this?", "options": {"A": "Volume-level encryption", "B": "Full-disk encryption", "C": "File-level encryption", "D": "Partition-level encryption"}, "correct": "B", "explanation": "Full-disk encryption provides the most security in situations like this if the device is locked or off. Volume- and partition-level encryption may leave some drive information or even entire volumes or partitions unencrypted, and file-level encryption is typically selective instead of covering every file on a drive."}, {"n": 25, "q": "Mahmoud has been asked to implement an allow list for websites that users at his company can visit. What concern should he bring up to management due to this request?", "options": {"A": "Allow lists cannot be used for websites.", "B": "Allow lists are overly permissive and are likely to allow unwanted sites to be visited.", "C": "Using an allow list for websites will take a lot of time to maintain.", "D": "Using an allow list for websites is easily bypassed."}, "correct": "C", "explanation": "In most organizations attempting to use an allow list for websites will take up a lot of time. Mahmoud knows that allow lists can be set up for websites, often at a central network security device-level like a firewall. Bypassing allow lists may be possible, but this can largely be prevented if desired. Allow lists are not overly permissive unless they are configured that way."}, {"n": 26, "q": "Which of the following change management processes does not commonly directly involve stakeholders outside of the IT organization?", "options": {"A": "Impact analysis", "B": "Building the backout plan", "C": "The change approval process", "D": "Determining the maintenance window"}, "correct": "B", "explanation": "Administrators and system owners typically build backout plans. Stakeholders are involved in impact analysis as they help technical staff understand what the impact of changes will be on business areas. They engage in the change approval process, and they help to determine the maintenance window to ensure that impact on the business is minimized."}, {"n": 27, "q": "What hardware component is used to generate, store, and manage cryptographic keys?", "options": {"A": "A CPU", "B": "A NSA", "C": "A TPM", "D": "A CCA"}, "correct": "C", "explanation": "A TPM, or trusted platform module, is a hardware-based, cryptographic processor that is used to generate, store, and manage cryptographic keys. It is also used to help ensure platform integrity by allowing boot validation processes to occur in a secure manner. A CPU is the main processor for a system, NSA is the National Security Agency, and a CCA is a chosen ciphertext attack, a type of attack against cryptographic systems where the attacker can cause a cryptographic system to encrypt known text for analysis."}, {"n": 28, "q": "Chris wants to check to see if a certificate has been revoked. What protocol can he use to validate the current status of a certificate?", "options": {"A": "TLS", "B": "OCRS", "C": "SSL", "D": "OCSP"}, "correct": "D", "explanation": "The Online Certificate Status Protocol (OCSP) is used to validate certificate status, including checking to see if the certificate is on a certificate revocation list (CRL). TLS is Transport Layer Security, a protocol used to encrypt data in transit between systems that relies on cryptographic certificates, but it is not used to validate the status of certificates on a CRL. Despite SSL itself being outmoded, the term SSL is commonly used to refer to TLS\u2014but here, neither TLS nor SSL is the right option. OCRS was made up for this question."}, {"n": 29, "q": "Brian's organization uses a process where a secure module boots systems, then monitors them as each boot stage proceeds. It validates each signed boot stage and reports on whether the boot process was correct or not when complete. What is the secure module used to verify these stages called?", "options": {"A": "A secure initiation manager", "B": "A root of trust", "C": "A boot hash", "D": "A cryptographic boot manager"}, "correct": "B", "explanation": "A root of trust\u2013based secure boot process validates each signed component as it starts and ensures that the trusted components are all loaded as part of the boot process. Changes to the components are reported as exceptions, meaning that the boot process cannot be properly verified or trusted. Secure initiation manager, boot hash, cryptographic boot manager were made up for this question."}, {"n": 30, "q": "A vulnerability scan shows that an embedded device that Alice is responsible for has a vulnerability. She knows the vendor is no longer in business and that there is no updated firmware or software update for the device. To resolve the issue, Alice places a firewall between the device and the rest of the network and creates rules that prevent the vulnerable service from being available to other devices. What type of control has Alice deployed?", "options": {"A": "A directive control", "B": "A compensating control", "C": "A detective control", "D": "A procedural control"}, "correct": "B", "explanation": "Alice has deployed a compensating control since she cannot apply controls like patching, configuration, or updates. Directive controls provide formal directions to staff, detective controls detect issues rather than preventing them directly, and procedural controls are not a type of control type used on the Security+ exam."}, {"n": 31, "q": "Jason knows that his Apple system uses a separate portion of its SoC (system on chip) to store keys and biometric information. What is this specialized component called?", "options": {"A": "A TPM", "B": "A HSM", "C": "A secure enclave", "D": "A screened subnet"}, "correct": "C", "explanation": "Apple devices use a specialized, separate coprocessor that uses encrypted memory and storage as well as dedicated cryptographic functions called a secure enclave. This is distinct from a TPM or HSM, and a screened subnet is a networking concept for a space that will be exposed to the less secure zones while needing to remain secure."}, {"n": 32, "q": "What change management term is used to describe the processes that an organization uses for each change that is made to ensure that a consistent process is used?", "options": {"A": "Standard operating procedures", "B": "A change plan", "C": "Fixed operating procedures", "D": "A backout plan"}, "correct": "A", "explanation": "Standard operating procedures (SOPs) are an organization's normal processes that it uses. SOPs are helpful to ensure that organizations have consistent practices that are in use on an ongoing basis. A change plan is specific to a change, and a backout plan is used to undo a change if problems arise. Fixed operating procedures is not a common term used in change management."}, {"n": 33, "q": "Jack knows that there are three common types of database encryption. Which of the following is not a common type of database encryption?", "options": {"A": "Sensitivity-based encryption", "B": "Transparent data encryption", "C": "Field-level encryption", "D": "Column-level encryption"}, "correct": "A", "explanation": "Transparent data encryption, field-level, and column-level encryption are all common types of database encryption. Sensitivity-based encryption is not and was made up for this question."}, {"n": 34, "q": "Ujamaa wants to conduct a gap analysis as part of his security efforts. Which of the following best describes what he will analyze?", "options": {"A": "Which services are not configured properly", "B": "Whether current patches are installed on all systems", "C": "The security program as implemented versus best practices", "D": "Legal requirements versus the security program"}, "correct": "C", "explanation": "Gap analysis focuses on reviewing a security program against common best practices to identify where gaps between practices exist. Ujamaa will select an information security standard like NIST 800-53, ISO 27001, or another relevant standard and will validate his organization's controls implementation against it. This may include things like which services are not configured properly, whether patches are installed, and if legal requirements are being met, but any of those answers is not a complete answer in this context."}, {"n": 35, "q": "Brandon wants to deploy a detective control that will help him with physical security threats. Which of the following fits his needs?", "options": {"A": "Fencing", "B": "Lighting", "C": "Video surveillance", "D": "Bollards"}, "correct": "C", "explanation": "Video surveillance is a detective control and is useful for detecting security events after they have happened. Fencing, bollards, and lighting are typically considered preventive controls."}, {"n": 36, "q": "Jack has deployed a system that appears to attackers to be a vulnerable system. The system is specifically designed to capture information and data from attacks to allow for later analysis. What type of tool has Jack deployed?", "options": {"A": "A tarpit", "B": "A honeypot", "C": "A beehive", "D": "An intrusion detection system"}, "correct": "B", "explanation": "Honeypots are designed to appear to be vulnerable. They are heavily instrumented to capture attacker techniques and tools, allowing for analysis by defenders. Tarpits slow down attackers, beehives are not a term used in this context, and intrusion detection systems (IDSs) are designed to identify and alert about attacks but are not designed to appear to be vulnerable."}, {"n": 37, "q": "Renee wants to ensure that her logs support nonrepudiation. What should she do to ensure this?", "options": {"A": "Encrypt, then hash the logs.", "B": "Hash the logs and then digitally sign them.", "C": "Digitally sign the log file, then encrypt it.", "D": "Hash, then encrypt the logs."}, "correct": "B", "explanation": "Calculating a cryptographic hash allows the log's hash to be compared against copies to validate that they match. Digitally signing the hash ensures that it can be verified to be the original. Encrypting the log does not allow it to be verified against an original. Without a digital signature, a hash does not meet Renee's requirement for nonrepudiation."}, {"n": 38, "q": "Isaac wants to deploy sensors to detect intruders in a facility, but he is concerned about the sensors being overly sensitive. What type of sensor is best suited to detecting intruders in an open office environment without significant expense or issues with sensitivity?", "options": {"A": "Infrared", "B": "Pressure", "C": "Microwave", "D": "Ultrasonic"}, "correct": "A", "explanation": "Infrared sensors are commonly used in open spaces. They are well suited to detecting individuals and are less likely to be overly sensitive. They can cover broader fields than a pressure sensor, and ultrasonic sensors are not commonly deployed as facility-level security sensors."}, {"n": 39, "q": "Wayne wants to allow systems to claim identities as part of his AAA process. Which of the following is most commonly used to identify both individuals and systems?", "options": {"A": "Tokens", "B": "Smartcards", "C": "Certificates", "D": "Usernames"}, "correct": "C", "explanation": "Certificates are commonly used to identify both individuals and systems. Tokens, smartcards, and usernames are primarily used by individuals."}, {"n": 40, "q": "What are considerations like database and network connectivity, authentication system access, and network time availability considered in the context of change management processes?", "options": {"A": "Allowed services", "B": "Standard operating procedures", "C": "Denied services", "D": "Dependencies"}, "correct": "D", "explanation": "Database and network connectivity, authentication system access, and network time availability are all common dependencies that must be considered when making changes. Applications and services may fail to start properly if these dependencies are not available when they attempt to start."}, {"n": 41, "q": "What role does the policy engine play in a zero-trust environment?", "options": {"A": "It creates new administrative policies based on user behavior.", "B": "It grants access based on policies created by administrators and based on security systems data.", "C": "It enforces policies by monitoring connections between clients and servers.", "D": "It suggests new administrative policies based on usage patterns for adoption by the organization."}, "correct": "B", "explanation": "Policy engines decide whether to grant access to resources based on policies created by administrators and based on data provided by tools like endpoint detection and response tools, threat intelligence feeds, and security information and event management tools. It does not create or suggest administrative policies, and it does not directly enforce policies\u2014that occurs at a policy enforcement point, typically through a zero-trust agent on the client and at the resource or service side."}, {"n": 42, "q": "Which of the following is not a common post-change activity found in change management practices?", "options": {"A": "Updating diagrams", "B": "Updating procedures", "C": "Updating policies", "D": "Updating contracts"}, "correct": "D", "explanation": "Contracts tend to be updated as part of a contract renewal process, not as part of a change management process related to technical change."}, {"n": 43, "q": "Which of the following activities should Alaina not restrict as part of her preparation for a change window?", "options": {"A": "Patching", "B": "Scaling clustered systems up or down", "C": "Changing hostnames", "D": "Modifying database configurations"}, "correct": "B", "explanation": "Change windows rely on the documented change being able to be made. Patching and other technical changes may lead to unexpected interactions or dependency changes that are not accounted for in the original change window. Scaling a clustered system up or down does not change the systems and should not be restricted during a change management window."}, {"n": 44, "q": "What two key features define blockchain ledgers?", "options": {"A": "They are immutable and nontransferable.", "B": "They are shared and can be modified by a vote among all participants.", "C": "They are unique to each participant and are atomic.", "D": "They are shared and immutable."}, "correct": "D", "explanation": "Blockchain ledgers are immutable\u2014they cannot be changed after they are recorded, and they are shared, which means that each participant in the blockchain has access to the entire ledger. Transactions are recorded only once and cannot be tampered with\u2014in fact, if an error is made and recorded, a new record has to be created including the fix, and both records will be accessible to show the history of what occurred."}, {"n": 45, "q": "Damian issues the following command on his Linux server: openssl req -new -newkey rsa:2048 -nodes -keyout exampleserver.key -out exampleserver.csr. What has he done?", "options": {"A": "Created a certificate signing request", "B": "Created a certificate revocation request", "C": "Signed a certificate signing request", "D": "Updated the OCSP record for a certificate"}, "correct": "A", "explanation": "Damian has created a certificate signing request, which he can submit to a certificate authority (CA)."}, {"n": 46, "q": "Nick's organization sets aside Saturday nights from 2 a.m. to 4 a.m. for scheduled maintenance. What is this type of reserved time typically called?", "options": {"A": "Allocated downtime", "B": "A maintenance window", "C": "An unscheduled outage", "D": "An allowed outage"}, "correct": "B", "explanation": "Preplanned times when maintenance is done and outages may occur is known as a maintenance window. An unscheduled outage is just that\u2014unscheduled and unplanned, often due to a failure or other issue. Allocated downtime and allowed outages are not common terms for this."}, {"n": 47, "q": "Megan wants to assess the impact of a change as part of her change management process. Which of the following is most likely to help her assess impact?", "options": {"A": "A backout plan", "B": "An estimate of the downtime expected", "C": "A list of stakeholders", "D": "A list of dependencies for impacted systems"}, "correct": "B", "explanation": "An estimate of the downtime expected as part of the change will help Megan to assess the impact of the change on her organization's business operations. A backout plan is useful if something goes wrong and can help estimate impact if that happens, but it does not identify impact under normal circumstances. A list of stakeholders can help when communicating with stakeholders to notify them of what will occur, but without the estimate of downtime, Megan will not be able to ask them what the impact would be. Finally, a list of dependencies is helpful to ensure that the change does not have unexpected issues, but the downtime expected remains the most important item."}, {"n": 48, "q": "Jared wants to estimate the downtime that will result as part of a planned change. Which of the following methods will most effectively help him estimate downtime?", "options": {"A": "Average the downtime from other recent changes.", "B": "Contact the vendor for time estimates for the change.", "C": "Perform the change in a test environment.", "D": "Use a fixed maintenance window."}, "correct": "C", "explanation": "Organizations often perform changes in a test environment to allow accurate time estimates and to determine if there are issues with the change like undocumented dependencies or problems with patches. Average downtime is a poor indicator of what a specific change may require, a fixed maintenance window does not ensure the change will take that amount of time, and vendors rarely have a full understanding of the environment an organization is operating in."}, {"n": 49, "q": "An encryption method in which all participants have the same key is known as which of the following types of encryption?", "options": {"A": "Shared hashing", "B": "Asymmetric encryption", "C": "Symmetric encryption", "D": "Universal encryption"}, "correct": "C", "explanation": "Symmetric encryption uses the same key for all participants in an exchange. Asymmetric encryption uses public and private keys where public keys are shared and private keys are retained. Shared hashing and universal encryption are not terms commonly used to describe encryption."}, {"n": 50, "q": "What important encryption challenge does asymmetric encryption help with by using public keys?", "options": {"A": "Evil twins", "B": "Collision resistance", "C": "Key length", "D": "Key exchange"}, "correct": "D", "explanation": "Asymmetric encryption makes key exchange possible because public keys are just that: public. They can be shared without causing a loss of cryptographic security or repudiation. They do not help with collision resistance, key length, or evil twins (which are malicious wireless access points)."}, {"n": 51, "q": "Rick's cloud provider offers a dedicated hardware security module. Which of the following capabilities is it unlikely to offer?", "options": {"A": "Validating secure boot processes", "B": "Key generation", "C": "Encrypting and decrypting data", "D": "Creating digital signatures"}, "correct": "A", "explanation": "A TPM is used to validate secure boot processes. A hardware security module (HSM) is used for key generation, storage, and management as well as for encrypting and decrypting data and creating and validating digital signatures."}, {"n": 52, "q": "Michelle believes that an image she has discovered in an attacker's directory of files contains additional information that has been hidden in it. What is this type of obfuscation called?", "options": {"A": "Steganography", "B": "Image hashing", "C": "PNG warping", "D": "Image blocking"}, "correct": "A", "explanation": "Steganography is the art of hiding additional data in images. Michelle can use steganography detection tools to attempt to find the data, but attackers may use custom tools that could avoid detection as well. The other options were made up for this question."}, {"n": 53, "q": "Which of the following is not a common transport encryption protocol?", "options": {"A": "TLS", "B": "IPSec", "C": "SAML", "D": "SSH"}, "correct": "C", "explanation": "SAML is the Security Assertion Markup Language, used to exchange authentication and authorization data between identity providers and service providers. TLS, IPSec, and SSH are all common transport encryption protocols."}, {"n": 54, "q": "What technology is record-level encryption most commonly associated with?", "options": {"A": "Stored audio files", "B": "Databases", "C": "Physical disks", "D": "Removable storage"}, "correct": "B", "explanation": "Record-level encryption is commonly associated with databases, where it is used to encrypt each record with a unique encryption key, allowing it to be more secure than database-level encryption."}, {"n": 55, "q": "Yasmine submits the Windows BitLocker key to a central repository after she encryptions the machine. The central repository allows files to be uploaded, but not read, and is protected with access requiring special permissions. What type of solution is Yasmine's company using?", "options": {"A": "A hardware security module", "B": "Perfect forward secrecy", "C": "Key escrow", "D": "Private keys"}, "correct": "C", "explanation": "Yasmine's company has implemented a key escrow process where encryption keys are retained by the organization in case the files on the drive need to be accessed by someone with proper authority. A hardware security module (HSM) is a hardware device used to create and store encryption keys, among other encryption-related functions. Perfect forward secrecy (PFS) is a term used in encryption systems that change keys frequently to ensure that even if a key is hacked, the attacker's access to data will exist in a limited window. Private keys are part of asymmetric encryption schemes and do not reflect the full solution Yasmine's organization is using."}, {"n": 56, "q": "Valerie wants to authenticate her systems using her AAA system. Which of the following options is best suited to system authentication?", "options": {"A": "Asymmetric authentication", "B": "Certificate-based authentication", "C": "Symmetric authentication", "D": "PIN-based authentication"}, "correct": "B", "explanation": "Certificates are commonly used for system authentication in AAA systems. While asymmetric and symmetric are forms of encryption, they are not authentication schemes, and PIN-based authentication is not commonly used for system authentication."}, {"n": 57, "q": "Valentine wants to detect if an intruder has accessed a secured file server. Which of the following techniques will work best with a data loss prevention tool to identify data exfiltration?", "options": {"A": "A honeypot", "B": "A honeynet", "C": "A honeyfile", "D": "A honeytoken"}, "correct": "C", "explanation": "Honeyfiles are files that are intentionally made to look attractive while being configured for detection by data loss prevention and intrusion prevention/detection systems. A honeypot is an intentionally vulnerable system that is used to monitor attacker behavior and techniques for analysis. Honeynets are networks that are configured to be intentionally vulnerable and that operate much like honeypots at a network level. Honeytokens are credentials that are not actually used but that are monitored for use in case an attacker is able to capture them."}, {"n": 58, "q": "Jason has recommended that additional lighting be put in place on the exterior of his building as part of a security upgrade. What type of control is lighting?", "options": {"A": "Operational", "B": "Deterrent", "C": "Corrective", "D": "Technical"}, "correct": "B", "explanation": "Lighting is a deterrent control type and would typically be categorized as a physical control."}, {"n": 59, "q": "Which of the following controls is typically the most expensive to implement?", "options": {"A": "Bollards", "B": "Access control vestibules", "C": "Security guards", "D": "Access badges"}, "correct": "C", "explanation": "Any control that requires constant human presence like security guards is likely to have a higher ongoing cost than controls that can be put in place and operate without human intervention or presence."}, {"n": 60, "q": "Frankie wants to validate the integrity of a file by comparing it against an original copy. Which of the following solutions both fulfills this requirement and avoids known security issues?", "options": {"A": "Hash the original file and the current file using MD5 and compare the hashes.", "B": "Hash the original file and the current file using SHA-1 and compare the hashes.", "C": "Hash the original file and the current file using SHA-256 and compare the hashes.", "D": "Hash the original file and the current file using AES and compare the hashes."}, "correct": "C", "explanation": "SHA-256 is the current, secure hashing standard. While it is unlikely that a malicious actor would exploit known flaws in MD5 and SHA-1, in most normal operations SHA-256 remains the preferred option when it is available. The Advanced Encryption Standard (AES) is used for encryption, not hashing."}, {"n": 61, "q": "Joanna's organization has a policy that requires a user's password to be immediately reset to lock accounts if the account is determined to have been successfully phished. What type of control is this?", "options": {"A": "A detective control", "B": "A directive control", "C": "A compensating control", "D": "A preventive control"}, "correct": "B", "explanation": "Policies are examples of directive controls. This could also be considered a corrective control, but that is not one of the options listed. Detective controls identify security events that have already occurred, and this does not detect the compromised account\u2014it directs what must happen afterward. A compensating control mitigates risks due to exceptions in the security policy. A preventive control attempts to stop a security issue before it occurs. Here, the issue has already occurred."}, {"n": 62, "q": "Jackie wants to implement an AAA system for her network. What AAA protocol is commonly used for network devices?", "options": {"A": "OpenID", "B": "SAML", "C": "RADIUS", "D": "TANGENT"}, "correct": "C", "explanation": "RADIUS is commonly used for AAA for network devices. OpenID and SAML are more commonly associated with federated services, and TANGENT is not an AAA protocol or server."}, {"n": 63, "q": "Scott wants to automate policy creation in his zero-trust environment's policy engine. Which of the following is not a typical component for automated data and event-driven policy management?", "options": {"A": "A SIEM", "B": "Threat feeds", "C": "Infrared sensor data", "D": "EDR tools"}, "correct": "C", "explanation": "Physical security sensors are not typically part of a zero-trust policy engine feed. Zero-trust environments primarily focus on network and systems access rather than physical security and access."}, {"n": 64, "q": "Valerie's zero-trust system has received an authentication prompt when she is attempting to access a file server. What component of the zero-trust architecture is she interacting with?", "options": {"A": "A policy enforcement point", "B": "A policy administrator", "C": "The policy engine", "D": "The trust manager"}, "correct": "A", "explanation": "Valerie is interacting with a policy enforcement point, the agent and resource-side elements that validate trust by requiring authentication and authorization before allowing access to a resource. The policy enforcement point will validate her access through the policy engine, which will be configured by the policy administrator. Trust managers are not a typical component of the zero-trust model."}, {"n": 65, "q": "Matt is assessing his organization's zero-trust model against the NIST Zero Trust Maturity Model. Which of the following is not a common element of zero-trust systems that would be assessed as part of the model?", "options": {"A": "Identity", "B": "Business model", "C": "Networks", "D": "Devices"}, "correct": "B", "explanation": "Identity, devices, networks, applications and workloads, and data are all assessed as part of the NIST Zero Trust Maturity Model. The model does not assess an organization's business model or practices."}, {"n": 66, "q": "Quentin wants to deploy a single sign-on system to allow his users to log in to cloud services. Which of the following technologies is he most likely to deploy?", "options": {"A": "OpenID", "B": "Kerberos", "C": "LDAP", "D": "TACACS+"}, "correct": "A", "explanation": "OpenID is an open standard for decentralized authentication that is used by many cloud service providers. Kerberos, LDAP, and TACACS+ are all most commonly associated with on-site usage."}, {"n": 67, "q": "Marty wants to deploy a corrective control to deal with a recently compromised system. Which of the following would be considered a corrective control?", "options": {"A": "Patching the vulnerability that allowed the compromise to occur", "B": "Deploying full-disk encryption", "C": "Deploying an endpoint detection and response (EDR) tool", "D": "Enabling logging and sending logs to a SIEM"}, "correct": "A", "explanation": "Corrective controls attempt to remediate security issues that have already occurred. Patching the flaw that allowed an attack to succeed is an example of a corrective control. Deploying full-disk encryption or an EDR tool are both examples of preventive controls, and logging and log monitoring are examples of detective controls."}, {"n": 68, "q": "What important encryption feature is not supported by symmetric encryption?", "options": {"A": "Confidentiality", "B": "Integrity", "C": "Nonrepudiation", "D": "Authentication"}, "correct": "C", "explanation": "Symmetric encryption does not support nonrepudiation because both parties have the same key. Both asymmetric and symmetric encryption can provide confidentiality, integrity, and authentication."}, {"n": 69, "q": "Theresa wants to use a cloud-hosted security solution that will allow her to safely store and manage secrets. What type of solution should she select?", "options": {"A": "A TPM", "B": "A CA", "C": "A KMS", "D": "A CSR"}, "correct": "C", "explanation": "A KMS, or key management system, is a solution that allows you to safely store and manage secrets like keys and certificates. Centralizing a KMS allows organizations to effectively manage their secrets, including tracking their life cycle and rotation. A TPM is used for hardware security on physical systems, a CA is a certificate authority used to create and sign certificates, and a CSR is a certificate signing request."}, {"n": 70, "q": "Joanna is reviewing her account information on an e-commerce website and sees her credit card number displayed as XXXX-XXXX-XXXX-1234. What type of data obfuscation is in use?", "options": {"A": "Hashing", "B": "Data masking", "C": "Field encryption", "D": "Tokenization"}, "correct": "B", "explanation": "Data masking conceals elements of a data field or entry, preventing all of it from being seen but leaving it accessible through the database when masking is not used. Tokenization replaces values with a reference value\u2014often a hash that can be used to refer to the value without using the actual entry. Hashing is a one-way function. Field encryption is not a common term."}, {"n": 71, "q": "Amanda's organization wants to use a decentralized blockchain to store data. Which of the following is true about a decentralized blockchain?", "options": {"A": "No individual or group controls the blockchain.", "B": "Only cryptocurrency-related data can be stored in a blockchain.", "C": "Blockchain data can be changed after being stored by the original submitter.", "D": "Blockchain ledgers are stored on central servers chosen by regular elections among blockchain participants."}, "correct": "A", "explanation": "In a decentralized blockchain, no individual or group controls the blockchain. Blockchains can store many types of data, including but not limited to transactions. Blockchain transactions are permanent once written, and a new transaction or update would need to be recorded rather than revising an existing transaction. Blockchain transactions are stored on the blockchain maintained by participants, not on central servers chosen by election."}, {"n": 72, "q": "What role does a subordinate CA have in a CA hierarchy?", "options": {"A": "Subordinate CAs issue certificates based on subdomains.", "B": "Subordinate CAs provide control over certificate issuance while avoiding the cost of being a root CA.", "C": "Subordinate CAs validate root CA activities to ensure auditability.", "D": "Subordinate CAs review certificate signing requests before forwarding them to the root CA."}, "correct": "B", "explanation": "Subordinate CAs avoid the cost of maintaining a root CA while providing control over certificates that are issued and allowing specialized support for different types of certificates like SSL and S/MIME. Subordinate CAs can issue certificates for any allowed domain or subdomain, are not required to ensure auditability, and can sign certificates themselves."}, {"n": 73, "q": "Which of the following sensor types is commonly used to detect footsteps?", "options": {"A": "Infrared", "B": "Pressure", "C": "Microwave", "D": "Ultrasonic"}, "correct": "B", "explanation": "Pressure sensors can be deployed to detect footsteps in a secured area. Infrared and microwave sensors are more commonly used to detect motion, and ultrasonic sensors are rarely used for security purposes."}, {"n": 74, "q": "Which of the following is not a managerial control?", "options": {"A": "Risk assessments", "B": "Including security in change management processes", "C": "Security planning exercises", "D": "Implementing firewalls"}, "correct": "D", "explanation": "Firewalls are a technical control, not a managerial control that focuses on the mechanics of the risk management process."}, {"n": 75, "q": "What purpose do third-party certificates serve for customers of cloud services?", "options": {"A": "They reduce costs by using bring-your-own certificates.", "B": "They allow certificates for domains other than the service provider's domain.", "C": "They provide control over cryptographic security for the customer.", "D": "They allow more flexibility in TLS version selection."}, "correct": "C", "explanation": "Third-party certificates allow customers to have full control over the certificate, including the private key and certificate signing request. By bringing your own certificate, encrypted traffic cannot be decrypted by the cloud provider. Using provider-provided or -created certificates leads to a potential risk if the provider is malicious or compromised. Bringing your own certificate does not necessarily reduce costs."}, {"n": 76, "q": "Which of the following is not a common control focused on availability?", "options": {"A": "Uninterruptible power systems", "B": "Redundant Internet connectivity", "C": "Disk encryption", "D": "Load balancers"}, "correct": "C", "explanation": "Disk encryption is commonly used to ensure confidentiality of data. UPS, load balancers, and redundant Internet connectivity all support availability."}, {"n": 77, "q": "What term describes a collection of honeypots on a network intended to capture information about cybersecurity threats?", "options": {"A": "A honeyfarm", "B": "A honeynet", "C": "A honeycluster", "D": "A darknet"}, "correct": "B", "explanation": "Honeynets are collections of decoy systems and devices that are instrumented and monitored, providing organizations and individuals with information about how threat actors attack targeted systems. Honeyfarm and honeycluster are not industry terms, and darknets are segments of unused network space that should not receive traffic."}, {"n": 78, "q": "Skip wants to implement a deterrent control to prevent physical security issues for his organization. Which of the following controls should he select?", "options": {"A": "A fence", "B": "A generator", "C": "Access badges", "D": "A camera system"}, "correct": "A", "explanation": "Fencing is considered a deterrent because it will discourage potential intruders from accessing facilities. Generators are used to ensure availability and are a preventive control. Access badges are a technical and preventive control in most cases. A camera system is a detective, technical control."}, {"n": 79, "q": "What holds the position of the root of trust in a certificate chain?", "options": {"A": "A hardened hardware device", "B": "A TPM", "C": "A root certificate", "D": "A wildcard certificate"}, "correct": "C", "explanation": "The root certificate, or top certificate for a certificate chain, is the root of trust of the chain, and it must be kept secure so the entire certificate and CA hierarchy can be trusted. Hardened hardware devices may be used to store it, but they are not the actual root itself. A TPM is used to store system-specific security data, and wildcard certificates cover more than one subdomain for an organization."}, {"n": 80, "q": "Jill needs to explain the concept of open public ledgers to her organization as management wants to adopt a blockchain-based system. What should she tell them about access to the ledger?", "options": {"A": "Members must be added by a vote of all current members.", "B": "Anyone can join at any time.", "C": "Members must be added by a vote of more than 51 percent of current members.", "D": "Ledgers are public but membership is private and controlled by the creator of the ledger."}, "correct": "B", "explanation": "By definition, open public ledgers are open and public\u2014anyone can join at any time. No vote is required, and creators do not control the ledger once it is made public."}, {"n": 81, "q": "Olivia wants to use a self-signed certificate in her test environment for her organization's services to save money on commercial certificates. What warning should her team give her about the use of self-signed certificates in a test environment?", "options": {"A": "Certificate root of trust validation attempts will fail if implemented.", "B": "Self-signed certificates cannot be used for external users to support SSL.", "C": "Self-signed certificates cannot be used for internal users to support SSL.", "D": "Browsers will not allow self-signed certificates to be used when browsing sites."}, "correct": "A", "explanation": "Some software may attempt to validate the certificates in use and could fail. This may also lead to unexpected differences between production certificates and test certificates, which is undesirable in a test environment intended to mirror production. Both internal and external users can still successfully use self-signed certificates for SSL, but they will receive warnings in modern browsers."}, {"n": 82, "q": "Amanda is concerned about issues with dependencies that may be found during her pending change. What practice should she implement to help ensure unexpected dependency issues are not encountered?", "options": {"A": "Update organizational policies and procedures before the change.", "B": "Update functional diagrams before the change.", "C": "Validate the change in a test environment.", "D": "Document legacy applications that may create dependencies."}, "correct": "C", "explanation": "The most effective way to ensure that all dependencies have been satisfied is to perform the change in a matching test environment to ensure that all issues have been identified and resolved. Updating policies and procedures as well as diagrams is typically done after major changes that result in a need for updates. Legacy applications that may create dependencies are not the only potential source of dependency issues."}, {"n": 83, "q": "Lucca has implemented an authentication scheme that relies on ticket-granting tickets as part of the authentication process. What common authentication service has he implemented?", "options": {"A": "TACACS+", "B": "Kerberos", "C": "MS-CHAP", "D": "EAP"}, "correct": "B", "explanation": "Kerberos uses authentication tickets and ticket-granting tickets to grant session keys for services that clients present to services to access them. TACACS+, MS-CHAP, and EAP do not use this ticket-based approach."}, {"n": 84, "q": "Jocelyn wants to select a modern encryption algorithm for use in her organization. Which of the following is a currently recommended encryption algorithm?", "options": {"A": "AES-256", "B": "SHA1", "C": "DES", "D": "Blowfish"}, "correct": "A", "explanation": "AES-256 is the only currently recommended encryption solution on the list. SHA-1 is a hashing algorithm. DES and Blowfish both have vulnerabilities and have been replaced in modern usage."}, {"n": 85, "q": "Elizabeth wants to classify the following controls by their category. What category best describes lighting, fences, bollards, and access control vestibules?", "options": {"A": "Technical", "B": "Managerial", "C": "Operational", "D": "Physical"}, "correct": "D", "explanation": "Lighting, fences, bollards, and access control vestibules are all examples of physical controls."}, {"n": 86, "q": "Jack wants to ensure the integrity of a file that he is sending to a third party via email. How can he provide the integrity of a file to an organization that he has not done business with before?", "options": {"A": "Encrypt the file and send it to them.", "B": "Digitally sign the file.", "C": "Send a hash of the file in a separate email.", "D": "Email the file size and original name in a separate email."}, "correct": "B", "explanation": "Jack should digitally sign the file and provide his public key to the other organization. This will allow them to validate his signature, as well as the integrity of the signed file. Encrypting the file does not ensure its integrity but does protect its confidentiality. Sending a hash does not ensure that the email was not modified, and emailing file size and name does not ensure the file was not changed."}, {"n": 87, "q": "Annie notices that her browser shows that the certificate for the site she is visiting is not valid. After performing some checks, she sees that the certificate is on the CA's certificate revocation list. Which of the following is not a reason for a certificate to be on a CRL?", "options": {"A": "The CA is compromised.", "B": "The certificate's private key was compromised.", "C": "The certificate was signed with a stolen key.", "D": "The certificate expired."}, "correct": "D", "explanation": "Certificates expire, but expiration does not place them on a CRL. That avoids extremely long CRLs in most cases, and the expired certificate contains sufficient information to know that the certificate is expired without being on a CRL. Reasons to add a certificate to a CRL include the CA being compromised, the certificate's private key being compromised, a mis-issued certificate, or certificates that were fraudulently signed."}, {"n": 88, "q": "Mohinder wants to use modern, secure hashing algorithms to validate files against known good originals. Which of the following hashing algorithms should he select?", "options": {"A": "MD5", "B": "SHA-1", "C": "AES-256", "D": "SHA-256"}, "correct": "D", "explanation": "SHA-256 is the only hashing algorithm listed that is considered current and secure as of the publication of this book. MD5 and SHA-1 both have known security issues, and AES-256 is an encryption algorithm."}, {"n": 89, "q": "Derrick wants to validate an encrypted and digitally signed message sent using asymmetric encryption. What does he need from the sender to validate the message?", "options": {"A": "The sender's private key", "B": "Derrick's private key", "C": "The sender's public key", "D": "Derrick's public key"}, "correct": "C", "explanation": "To verify whether a message was signed by a sender, the recipient needs the sender's public key."}, {"n": 90, "q": "The major patch release that Susan's team installed has failed, resulting in a nonworking service. What should her team do according to change management best practices?", "options": {"A": "Declare an outage.", "B": "Follow the documented backout plan.", "C": "Restore from backups to the previous version.", "D": "Uninstall the patch and validate service function."}, "correct": "B", "explanation": "Creating a complete backout plan and implementing it if something goes wrong that cannot be remediated during a change window is the accepted best practice in this scenario. That may involve restoring from backups or uninstalling the patch, but neither of these options is necessarily the correct answer in all circumstances."}, {"n": 91, "q": "The web server that Angela's organization manages was recently compromised and the SSL certificate's private key was accessed by attackers. Angela's team has completed remediation and has created a new CSR, including a new private key that they have secured. What type of control type best describes the creation of a new key and certificate in this circumstance?", "options": {"A": "Corrective", "B": "Compensating", "C": "Deterrent", "D": "Detective"}, "correct": "A", "explanation": "This is a corrective control because it remediates a security issue after the event has occurred. A compensating control would attempt to mitigate a risk associated with exceptions made to a security policy. Deterrent controls attempt to prevent an attacker from violating security policies, and detective controls identify security events that have already happened."}, {"n": 92, "q": "Mikayla's zero-trust system has received a request for access with an identity, and the basic criteria for access have been met. What should the system do next before providing access to the resource requested?", "options": {"A": "Check the remote system's security status.", "B": "Require reauthentication using MFA.", "C": "Check the user's rights to ensure they can access the resource.", "D": "Determine its level of confidence in the request."}, "correct": "D", "explanation": "A zero-trust system should validate its level of confidence in a request that it receives once the basic criteria have been met. This may involve checking the access against known patterns of access by the user, validating current threat feed information, or checking other details that will help ensure the security and authenticity of the request."}, {"n": 93, "q": "Charles sets up an RDP server on an isolated network segment and places a file on it called passwords.xlsx. He then configures his IPS and DLP systems to monitor for that file exiting the network segment. What type of tool has Charles deployed?", "options": {"A": "A honeyfile", "B": "A SQL trap", "C": "A red flag", "D": "A trigger file"}, "correct": "A", "explanation": "While many honeyfiles use canary tokens, simply monitoring for known files exiting systems that should not be accessed under normal circumstances is also a valid means to construct a honeypot and honeyfile-based detection system. Charles can use the file and the isolated system to detect attackers who attempt to exfiltrate the file. The other answers were made up for this question."}, {"n": 94, "q": "Lucca is using precomputed rainbow tables to attempt to crack hashed passwords from a data breach. He knows that two users have the same password, but the hashes do not match. What password hash security technique has Lucca most likely encountered?", "options": {"A": "Password encryption", "B": "Salting", "C": "Hash rotation", "D": "Password mismatching"}, "correct": "B", "explanation": "Salting uses a unique, randomly generated string that is added to each password before it is hashed. That means that even matching passwords will not have the same hash. This prevents rainbow tables from being effectively used against password hashes due to the added computational load it creates for precomputing hashes."}, {"n": 95, "q": "What operating system is commonly associated with secure enclaves?", "options": {"A": "Windows", "B": "iOS", "C": "Linux", "D": "Android"}, "correct": "B", "explanation": "Secure enclaves are used by Apple devices to securely store security information like cryptographic keys."}, {"n": 96, "q": "Isaac is concerned that the passwords that his users are creating are too short and can be easily brute-forced if their hashes were compromised. Rather than make his users remember longer passwords, he would like to implement a technical solution to help make the hashes more resistant to cracking. What solution can he use to help with this?", "options": {"A": "Implement pass-the-hash algorithms.", "B": "Use a collision-resistant hashing algorithm.", "C": "Implement key stretching techniques.", "D": "Encrypt passwords rather than hashing them."}, "correct": "C", "explanation": "Implementing key stretching techniques can help short\u2014and thus weak\u2014passwords resist brute-force hash cracking techniques. They won't help against brute-force password guessing attacks. Pass-the-hash attacks reuse hashes, and thus aren't a technique used to prevent brute-force attacks against hashed passwords. Collision resistance is a requirement for an effective hashing algorithm. Encrypting passwords is not a recommended practice."}, {"n": 97, "q": "Christina wants to implement access badges printed with picture IDs for her organization, but she wants to use a wireless reader. What access badge technology is commonly implemented in scenarios like this?", "options": {"A": "Wi-Fi-enabled access badges", "B": "RFID access badges", "C": "Bluetooth-enabled access badges", "D": "NFC access badges"}, "correct": "B", "explanation": "RFID badges are the most commonly implemented wireless identification badges. Wi-Fi and Bluetooth both require additional power for devices and thus are not a good fit for a badge, and NFC-enabled badges have not come into common use at this time, although they are increasingly available for mobile device\u2013enabled badges."}, {"n": 98, "q": "Kendra's vulnerability management team has discovered that IoT devices deployed a few years ago to monitor temperatures for critical refrigerated equipment are vulnerable to a new attack. The manufacturer has gone out of business. They suggest moving the devices to an isolated network to help protect them. What type of control has Kendra's team suggested?", "options": {"A": "A corrective control", "B": "A compensating control", "C": "A confidentiality control", "D": "A coordinated control"}, "correct": "B", "explanation": "A compensating control helps to mitigate a risk due to an exception to a security policy. Here, the devices cannot be patched or fixed but are important to the operations of the organization. Moving them to a protected network will help compensate for the lack of patching. Since no security issues have occurred, this is not a corrective control. Confidentiality and coordinated controls are not control types for the Security+ exam."}, {"n": 99, "q": "Which of the following is not a common factor in adaptive authentication for zero trust?", "options": {"A": "Where the user is logging in from", "B": "Whether the user has logged in recently from another device", "C": "What device the user is logging in from", "D": "If the device is configured correctly"}, "correct": "B", "explanation": "Adaptive authentication looks at the context of a login, including where they're logging in from, what device they're logging in from, and if the device is configured correctly. In modern, multidevice usage, whether the user has logged in recently from another device isn't as likely to be considered, but if the devices were in different countries it would likely raise a flag."}, {"n": 100, "q": "Juan's organization is designing their zero-trust model. Which of the following statements is true for network security zones?", "options": {"A": "All communication is secured, regardless of the network security zone it occurs in.", "B": "Communication receives additional security in low-trust zones.", "C": "Communication receives less security in high-trust zones.", "D": "All zero-trust networks are considered secured zones."}, "correct": "A", "explanation": "One of the basic tenets of zero-trust architecture is that all communication is secured, regardless of the security zone or trust zone that it occurs in. Additional security should not be required, nor should communications receive less security in higher trust zones. All zero-trust networks are considered potential risk areas\u2014thus the zero in zero trust!"}, {"n": 101, "q": "What advantage do microwave sensors have over infrared sensors?", "options": {"A": "They can detect heat signatures.", "B": "They are cheaper than infrared sensors.", "C": "They can penetrate some types of walls.", "D": "They do not interfere with sensitive equipment."}, "correct": "C", "explanation": "Microwave sensors work in temperature ranges that infrared sensors do not, and they can penetrate walls and some small spaces allowing more complete coverage. Microwave sensors cannot detect heat signatures, are not cheaper than infrared sensors, and can interfere with some types of sensitive equipment."}, {"n": 102, "q": "Isaac is conducting a physical penetration test and wants to bypass an access control vestibule. What must he accomplish?", "options": {"A": "He needs to persuade an individual to allow him to follow them through a single door.", "B": "He needs to acquire an individual's access card.", "C": "He needs to persuade an individual to allow him to follow them through two doors in a row.", "D": "He needs to acquire the individual's access PIN."}, "correct": "C", "explanation": "Access control vestibules are intended to make it obvious that someone is following you through secured doors and may only be large enough for a single person to come through at once. Larger vestibules rely on staff noticing that the person following them through is not providing credentials and ensuring that doors close between access attempts."}, {"n": 103, "q": "Rachel wants to select an obfuscation method that will allow her customer service representatives to validate customer identities without providing full access to customer data. What should she select?", "options": {"A": "Tokenization", "B": "Data masking", "C": "Steganography", "D": "Hashing"}, "correct": "B", "explanation": "Data masking reveals only part of a field and is often used with details like credit card numbers or Social Security numbers where only the last four digits will be revealed for validation purposes."}, {"n": 104, "q": "Valerie's manager has informed her that version control must be implemented for her development team's work. Which of the following is not a common, security-related reason for version control?", "options": {"A": "To help with patching", "B": "To track each contributor's workload", "C": "To ensure the proper version is deployed", "D": "To help with change management"}, "correct": "B", "explanation": "While version control has many useful impacts on security, tracking workload is not a security-related issue for version control."}, {"n": 105, "q": "Jackie's change management process involves reporting functional validation test results to stakeholders. Which of the following is not a common stakeholder or stakeholder group for an application upgrade?", "options": {"A": "Application administrators", "B": "Service owners", "C": "System administrators", "D": "Auditors"}, "correct": "D", "explanation": "While auditors may request application version information during audits, they are not typically notified during normal application updates and patching cycles. Application administrators, service owners, and system administrators are all commonly notified about functional validation test results."}, {"n": 106, "q": "How many keypairs are required for four individuals to communicate securely using asymmetric encryption?", "options": {"A": "1", "B": "4", "C": "8", "D": "12"}, "correct": "B", "explanation": "Each individual has their own keypair in asymmetric encryption systems; thus, for four individuals to communicate securely using asymmetric encryption four keypairs are needed."}, {"n": 107, "q": "Michelle wants to store secrets for her organization in a cloud service. She wants to ensure the greatest level of security for her organization, and she is willing to spend more money to provide that security. What solution should she look for?", "options": {"A": "A shared cloud TPM", "B": "A shared cloud HSM", "C": "A dedicated hardware cloud TPM", "D": "A dedicated hardware cloud HSM"}, "correct": "D", "explanation": "A dedicated, hardware-based, cloud-hosted hardware security module (HSM) is an appropriate solution for Michelle's needs. Cloud providers often provide shared HSMs as a service, which can increase perceived risk due to the shared underlying hardware. Dedicated hardware is typically available at a higher cost. Trusted platform modules (TPMs) are used to provide secure boot and related services, not to store secrets for an organization."}, {"n": 108, "q": "Murali wants to digitally sign a file. What key does he need to sign it?", "options": {"A": "The recipient's private key", "B": "His private key", "C": "The recipient's public key", "D": "His public key"}, "correct": "B", "explanation": "To sign a file, Murali needs to use his own private key. The recipient can then use their public key to validate the signature."}, {"n": 109, "q": "What information is necessary for a certificate to be identified properly in an OCSP request?", "options": {"A": "The domain name"
